workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    triggering:
      events: []
    environment:
      java: 17
      node: 20
      groups:
        - PROD
    scripts:
      - name: Decode keystore
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > "$FCI_BUILD_DIR/android/app/release.keystore"
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android APK
        script: |
          cd android && ./gradlew assembleRelease
      - name: Publish to Firebase App Distribution
        script: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-service-account.json
          npm install -g firebase-tools
          APK_PATH=$(find android/app/build/outputs -name "*.apk" | head -1)
          firebase appdistribution:distribute "$APK_PATH" \
            --app "$FIREBASE_APP_ID" \
            --groups "testers"
    artifacts:
      - android/app/build/outputs/**/*.apk
