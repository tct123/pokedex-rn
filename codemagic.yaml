workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    triggering:
      events: []
    environment:
      java: 17
      node: 20
      groups:
        - PROD
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Set version code
        script: |
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.android = appJson.expo.android || {};
            appJson.expo.android.versionCode = Number(process.env.BUILD_NUMBER) || 1;
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2) + '\n');
            console.log('Set versionCode to', appJson.expo.android.versionCode);
          "
      - name: Generate native project
        script: |
          npx expo prebuild --platform android
      - name: Decode Google Services config
        script: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
      - name: Decode keystore
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > android/app/release.keystore
      - name: Build Android APK
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      firebase:
        firebase_service_account: $FIREBASE_SERVICE_ACCOUNT
        android:
          app_id: 1:456356946742:android:7ddf4eeb213fd4f1180997
          groups:
            - testers
          artifact_type: apk
